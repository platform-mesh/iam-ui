@if (user) {
  <app-dashboard [header]="header" [showEditButton]="false">
    <fd-facet-group>
      <fd-facet type="image">
        <iam-avatar size="l" [user]="user" />
      </fd-facet>

      <fd-facet type="custom">
        <div class="user-name" data-testid="app-user-header-name">
          {{ getFirstLastNameOrUserId(user) }}
        </div>
        <div>
          <span>
            <fdp-button
              buttonType="transparent"
              data-testid="app-user-header-chat-button"
              fdCompact
              glyph="post"
              name="chat-button"
              title="Start a chat"
              (click)="chatWithUserViaTeams(user.email)"
            />
            <fdp-button
              buttonType="transparent"
              data-testid="app-user-header-email-button"
              fdCompact
              glyph="email"
              name="email-button"
              title="Send email"
              (click)="emailUser(user.email)"
            />
            <fdp-button
              buttonType="transparent"
              data-testid="app-user-header-call-button"
              fdCompact
              glyph="call"
              name="call-button"
              title="Start an audio call"
              (click)="callUserViaTeams(user.email)"
            />
          </span>
        </div>
      </fd-facet>

      <fd-facet facetTitle="" type="form">

          <fd-text [text]="getUserContactsHeaderText()" />
