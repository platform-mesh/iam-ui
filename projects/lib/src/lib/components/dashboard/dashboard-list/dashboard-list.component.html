@if (list.length > 0) {
  <ul fd-list [byline]="showByline">
    @for (item of list; track item.link) {
      <li fd-list-item [attr.data-testid]="item.testId">
        <a
          fd-list-link
          [href]="item.link"
          [style.cursor]="item.link ? 'pointer' : 'default'"
          (click)="handleClick($event, item.link)"
          target="_blank"
        >
          <span fd-list-thumbnail>
            @switch (item.type) {
              @case ('ListItemWithImage') {
                <fd-avatar
                  [contain]="true"
                  [size]="showByline ? 's' : 'xs'"
                  [transparent]="true"
                  [image]="item.image"
                ></fd-avatar>
              }
              @case ('ListItemWithUser') {
                <iam-avatar
                  [size]="showByline ? 's' : 'xs'"
                  [user]="item.user"
                ></iam-avatar>
              }
              @case ('ListItemWithIcon') {
                <fd-icon [glyph]="item.icon"></fd-icon>
              }
            }
          </span>
          <div fd-list-content>
            <div fd-list-title>{{ item.title }}</div>
            @if (showByline) {
              <div fd-list-byline>{{ item.byline }}</div>
            }
          </div>
        </a>
      </li>
    }
  </ul>
} @else {
  <ul fd-list [byline]="true" fdCompact>
    <li fd-list-item>
      <div fd-list-content>
        <div fd-list-title [wrap]="true">
          <figure fd-illustrated-message type="dot" [svgConfig]="svgConfig">
            <figcaption fd-illustrated-message-figcaption>
              <h3 fd-illustrated-message-title>
                {{ noItemTitle }}
              </h3>

              <p fd-illustrated-message-text>
                {{ noItemText }}
              </p>
              @if (actionDisabledTooltip && actionDisabled) {
                <fd-popover [triggers]="['mouseenter', 'mouseleave']">
                  <fd-popover-control>
                    <ng-container *ngTemplateOutlet="addBtn" />
                  </fd-popover-control>
                  <ng-template fdPopoverBody>
                    <div [style.margin.rem]="1">
                      {{ actionDisabledTooltip }}
                    </div>
                  </ng-template>
                </fd-popover>
              } @else {
                <ng-container *ngTemplateOutlet="addBtn" />
              }
            </figcaption>
          </figure>
        </div>
      </div>
    </li>
  </ul>
}

<ng-template #addBtn>
  <button
    ng-template="addBtn"
    *requiredPolicies="rolesAllowedForAddCallback; operator: 'or'"
    fd-button
    fdCompact
    [disabled]="actionDisabled"
    [label]="addLabel"
    (click)="addCallback.emit()"
  ></button>
</ng-template>
