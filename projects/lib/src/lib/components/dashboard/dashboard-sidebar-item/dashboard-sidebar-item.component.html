<h4>
  <button
    fd-button
    fdCompact
    fdType="transparent"
    [glyph]="collapsed ? 'slim-arrow-right' : 'slim-arrow-down'"
    [title]="collapsed ? 'Expand' : 'Collapse'"
    (click)="toggleCollapse()"
  ></button>
  {{ title }}
  @if (callbackDefined() && !editDisabled) {
    <button
      *requiredPolicies="rolesAllowedForCallback; operator: 'or'"
      fd-button
      fdType="transparent"
      glyph="edit"
      class="edit"
      title="Edit"
      (click)="editCallback.emit()"
    ></button>
  }
</h4>
<div [class.collapsed]="collapsed">
  @if (!loading) {
    <div>
      <ng-content></ng-content>
    </div>
  } @else {
    <div class="busy-indicator">
      <fd-busy-indicator
        [loading]="true"
        ariaLabel="loading"
        title="Please Wait"
      ></fd-busy-indicator>
    </div>
  }
</div>
