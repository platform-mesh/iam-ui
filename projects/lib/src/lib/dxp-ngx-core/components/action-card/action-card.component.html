<div>
  <fd-card [style]="'width:' + width + '; height: ' + height">
    @if (title) {
      <fd-card-header>
        <fd-card-main-header>
          <h2 fd-card-title>{{ title }}</h2>
        </fd-card-main-header>
      </fd-card-header>
    }
    <fd-card-content>
      @if (helpLink) {
        <button
          (click)="openCardLink(helpLink.link)"
          class="helpTooltip"
          fd-button
          [title]="helpLink.tooltip || ''"
          fdType="transparent"
          glyph="sys-help"
          ariaLabel="Help button"
        ></button>
      }
      <!-- workaround for https://github.com/SAP/fundamental-ngx/issues/12721 -->
      <div [hidden]="imageType !== 'centered'">
        <figure
          fd-illustrated-message
          type="spot"
          [svgConfig]="imageConfig"
        ></figure>
      </div>
      <div [hidden]="imageType !== 'fullsize'">
        @if (imageConfig.scene?.url || imageConfig.dialog?.url) {
          <svg width="100%" class="svg-fullsize">
            <use
              [attr.href]="
                (imageConfig.scene?.url || imageConfig.dialog?.url) +
                '#' +
                (imageConfig.scene?.id || imageConfig.dialog?.id)
              "
            ></use>
          </svg>
        }
      </div>
      <h2 class="card-heading">{{ heading }}</h2>
      <p class="card-content">{{ content }}</p>
      <div class="fd-card-actions">
        @for (action of actions; track action.text) {
          <span>
            @if (action.tooltip) {
              <app-dxp-info-popup>
                <div class="popupcontrol">
                  <button
                    fd-button
                    fdCompact
                    [label]="action.text"
                    (click)="clickAction(action)"
                    [fdType]="action.fdType"
                    [attr.data-testid]="action.testId"
                    [disabled]="action.disabled"
                  ></button>
                </div>
                <span class="popupcontent">
                  <div>
                    {{ action.tooltip }}
                  </div>
                </span>
              </app-dxp-info-popup>
            }

            @if (!action.tooltip) {
              <button
                fd-button
                fdCompact
                [label]="action.text"
                (click)="clickAction(action)"
                [fdType]="action.fdType"
                [attr.data-testid]="action.testId"
                [disabled]="action.disabled"
              ></button>
            }
          </span>
        }
      </div>
    </fd-card-content>

    @if (footer) {
      <div class="fd-form-label card-footer">{{ footer }}</div>
    }
  </fd-card>
</div>
